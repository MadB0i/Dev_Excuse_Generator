<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dev Excuse Generator - Ultimate Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;550;600;650;700;800;900&family=JetBrains+Mono:wght@450;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #05050a;
      --bg-elevated: rgba(14, 14, 28, 0.6);
      --bg-card: rgba(19, 19, 34, 0.5);
      --bg-hover: rgba(26, 26, 46, 0.8);
      --border: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.15);
      --text-primary: #e2e2f0;
      --text-secondary: #9494b8;
      --text-muted: #58587a;
      --accent: #818cf8;
      --accent-bg: rgba(129, 140, 248, 0.15);
      --accent-border: rgba(129, 140, 248, 0.3);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    .theme-light {
      --bg: #fdfcfa;
      --bg-elevated: rgba(232, 228, 221, 0.6);
      --bg-card: rgba(250, 248, 245, 0.6);
      --bg-hover: rgba(240, 236, 230, 0.8);
      --border: rgba(0, 0, 0, 0.08);
      --border-hover: rgba(0, 0, 0, 0.15);
      --text-primary: #1a1814;
      --text-secondary: #68635b;
      --text-muted: #a09990;
      --accent: #d97706;
      --accent-bg: rgba(217, 119, 6, 0.1);
      --accent-border: rgba(217, 119, 6, 0.2);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    ::view-transition-old(root),
    ::view-transition-new(root) {
      animation: none;
      mix-blend-mode: normal;
      display: block;
    }
    ::view-transition-old(root) { z-index: 1; }
    ::view-transition-new(root) { z-index: 2; }

    .sky-container {
      position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none;
    }

    .stars-bg {
      position: absolute; inset: -50%;
      background-image: 
        radial-gradient(2px 2px at 20px 30px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 40px 70px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 50px 160px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 90px 40px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 130px 80px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 160px 120px, #ffffff, rgba(0,0,0,0));
      background-repeat: repeat; background-size: 200px 200px;
      opacity: 0.6; animation: rotateStars 150s linear infinite; transition: opacity 0.8s ease;
    }
    .theme-light .stars-bg { opacity: 0; }
    @keyframes rotateStars { to { transform: rotate(360deg); } }

    .moon-element {
      position: absolute; top: 10%; right: 15%; width: 120px; height: 120px; border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #f3f4f6, #9ca3af);
      box-shadow: 0 0 60px rgba(255, 255, 255, 0.2), inset -15px -15px 30px rgba(0,0,0,0.4);
      transition: transform 1s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.8s ease;
      opacity: 1; transform: translateY(0) scale(1);
    }
    .moon-craters { position: absolute; inset: 0; border-radius: 50%; overflow: hidden; opacity: 0.4; }
    .crater { position: absolute; background: rgba(0,0,0,0.2); border-radius: 50%; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.3); }
    .theme-light .moon-element { transform: translateY(-100px) scale(0.5); opacity: 0; }

    .sun-element {
      position: absolute; top: 8%; right: 12%; width: 160px; height: 160px;
      display: flex; align-items: center; justify-content: center;
      transition: transform 1s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.8s ease;
      opacity: 0; transform: translateY(100px) scale(0.5);
    }
    .theme-light .sun-element { opacity: 1; transform: translateY(0) scale(1); }
    .sun-core {
      width: 70px; height: 70px; background: #fde047; border-radius: 50%;
      box-shadow: 0 0 80px #facc15, 0 0 140px #eab308; z-index: 2;
    }
    .sun-rays {
      position: absolute; width: 100%; height: 100%;
      background: repeating-conic-gradient(from 0deg, rgba(253, 224, 71, 0.2) 0deg, rgba(253, 224, 71, 0.2) 10deg, transparent 10deg, transparent 20deg);
      border-radius: 50%; animation: spinRays 25s linear infinite; filter: blur(4px);
    }
    @keyframes spinRays { to { transform: rotate(360deg); } }


    .ambient-glow {
      position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 100vw; height: 60vh;
      background: radial-gradient(ellipse at top, rgba(129, 140, 248, 0.08), transparent 70%); transition: background 1s ease;
    }
    .theme-light .ambient-glow { background: radial-gradient(ellipse at top, rgba(250, 204, 21, 0.15), transparent 70%); }

    .container { max-width: 720px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 10; }

    .header { display: flex; align-items: center; justify-content: space-between; padding: 32px 0; }
    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--text-primary); }
    .logo-icon {
      width: 36px; height: 36px; border-radius: 10px; background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono); font-weight: 700; font-size: 14px; color: #fff;
      box-shadow: 0 8px 20px var(--accent-bg); transition: transform 0.2s ease;
    }
    .logo:hover .logo-icon { transform: scale(1.08) rotate(-5deg); }
    .logo-text { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
    .logo-text span { color: var(--accent); }

    .theme-toggle {
      position: fixed; top: 32px; right: 32px; z-index: 100;
      width: 54px; height: 54px; border-radius: 16px;
      border: 1px solid var(--border); background: var(--bg-elevated); color: var(--text-secondary);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    }
    .theme-toggle:hover {
      transform: scale(1.1); border-color: var(--accent); color: var(--accent);
      box-shadow: 0 12px 40px rgba(0,0,0,0.3), 0 0 20px var(--accent-bg);
    }
    .theme-toggle svg { width: 22px; height: 22px; transition: transform 0.5s ease, opacity 0.5s ease; position: absolute; }
    .icon-sun { opacity: 0; transform: rotate(-90deg) scale(0.5); }
    .icon-moon { opacity: 1; transform: rotate(0deg) scale(1); }
    .theme-light .icon-sun { opacity: 1; transform: rotate(0deg) scale(1); }
    .theme-light .icon-moon { opacity: 0; transform: rotate(90deg) scale(0.5); }

    .hero { text-align: center; padding: 20px 0 50px; }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px; padding: 6px 16px;
      border-radius: 100px; background: var(--bg-elevated); border: 1px solid var(--border);
      font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 24px;
      backdrop-filter: blur(10px);
    }
    .hero-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: #10b981; box-shadow: 0 0 10px #10b981; }
    .hero h1 { font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 800; line-height: 1.1; letter-spacing: -1.5px; margin-bottom: 16px; }
    .hero h1 .accent-text { color: var(--accent); display: inline-block; }
    .hero p { font-size: 16px; color: var(--text-secondary); max-width: 500px; margin: 0 auto; line-height: 1.6; }

    /* PREMIUM CARD */
    .generator-card {
      background: var(--bg-card); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 40px;
      position: relative; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      transform: perspective(1000px) rotateX(var(--rotate-x, 0deg)) rotateY(var(--rotate-y, 0deg));
      will-change: transform; box-shadow: 0 20px 50px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.05);
      z-index: 5;
    }
    
    .generator-card:hover {
      box-shadow: 0 30px 60px rgba(0,0,0,0.25), 0 0 50px var(--accent-bg), inset 0 1px 0 rgba(255,255,255,0.1);
      transform: perspective(1000px) rotateX(var(--rotate-x, 0deg)) rotateY(var(--rotate-y, 0deg)) translateY(-4px);
      border-color: var(--accent-border);
    }

    .generator-card::before {
      content: ''; position: absolute; inset: -1px; border-radius: inherit; padding: 1px;
      background: linear-gradient(45deg, var(--accent-border), transparent, var(--border));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
    }
    
    @keyframes cardShake {
      0%, 100% { transform: perspective(1000px) rotateX(var(--rotate-x, 0deg)) rotateY(var(--rotate-y, 0deg)) translate(0, 0); }
      20% { transform: perspective(1000px) rotateX(var(--rotate-x, 0deg)) rotateY(var(--rotate-y, 0deg)) translate(-4px, 3px) rotate(-1deg); }
      40% { transform: perspective(1000px) rotateX(var(--rotate-x, 0deg)) rotateY(var(--rotate-y, 0deg)) translate(4px, -3px) rotate(1deg); }
      60% { transform: perspective(1000px) rotateX(var(--rotate-x, 0deg)) rotateY(var(--rotate-y, 0deg)) translate(-4px, -3px) rotate(0deg); }
      80% { transform: perspective(1000px) rotateX(var(--rotate-x, 0deg)) rotateY(var(--rotate-y, 0deg)) translate(3px, 3px) rotate(-0.5deg); }
    }
    .shake-anim { animation: cardShake 0.4s ease-in-out; }

    .category-indicator {
      display: inline-flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase; margin-bottom: 30px; color: var(--accent);
    }
    .category-indicator .indicator-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); }

    .excuse-display { min-height: 120px; display: flex; align-items: center; margin-bottom: 40px; position: relative; }
    .excuse-text { font-size: clamp(1.4rem, 2.5vw, 1.8rem); font-weight: 600; line-height: 1.5; letter-spacing: -0.5px; color: var(--text-primary); width: 100%; }
    .empty-state { color: var(--text-muted); font-size: 1.1rem; }

    /* BUTTONS  */
    .generator-actions { display: flex; gap: 12px; position: relative; z-index: 10; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      border-radius: 12px; font-family: var(--font-sans); font-size: 15px; font-weight: 600;
      border: none; cursor: pointer; transition: all 0.2s ease;
    }
    
    .btn-primary {
      flex: 1; padding: 14px 24px; background: var(--accent); color: #fff;
      box-shadow: 0 4px 15px var(--accent-bg), inset 0 1px 1px rgba(255,255,255,0.2);
      position: relative; overflow: hidden;
    }
    .btn-primary:hover {
      background: color-mix(in srgb, var(--accent) 80%, #fff);
      box-shadow: 0 8px 25px var(--accent-bg), inset 0 1px 1px rgba(255,255,255,0.4);
    }
    
    @keyframes panicSquish {
      0% { transform: scale(1); }
      25% { transform: scale(0.92, 1.08); }
      50% { transform: scale(1.08, 0.92); }
      75% { transform: scale(0.96, 1.04); }
      100% { transform: scale(1); }
    }
    .btn-squish { animation: panicSquish 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }

    .btn-secondary {
      padding: 14px; background: var(--bg-elevated); color: var(--text-primary);
      border: 1px solid var(--border); backdrop-filter: blur(10px);
    }
    .btn-secondary:hover { background: var(--bg-hover); border-color: var(--accent); color: var(--accent); }
    .btn-secondary svg { width: 18px; height: 18px; }

    /* FLOATING EMOJIS */
    .floating-emoji {
      position: absolute; font-size: 28px; pointer-events: none; z-index: 50; opacity: 1;
      animation: floatUp 1.2s ease-out forwards;
    }
    @keyframes floatUp {
      0% { transform: translateY(20px) scale(0.5) rotate(0deg); opacity: 0; }
      20% { transform: translateY(-10px) scale(1.2) rotate(15deg); opacity: 1; }
      100% { transform: translateY(-120px) scale(1) rotate(-25deg); opacity: 0; }
    }

    /* CATEGORIES */
    .section-label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 40px; margin-bottom: 16px; }
    .categories { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 50px; }
    
    .category-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 18px; border-radius: 12px; background: var(--bg-elevated); border: 1px solid var(--border);
      font-size: 13.5px; font-weight: 600; color: var(--text-secondary); cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); backdrop-filter: blur(10px);
    }
    
    .cat-icon { font-size: 16px; line-height: 1; display: inline-block; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .category-btn:hover { transform: translateY(-3px); border-color: var(--text-primary); color: var(--text-primary); }
    .category-btn:hover .cat-icon { transform: scale(1.25) rotate(-10deg); }
    .category-btn.active {
      background: var(--accent-bg); border-color: var(--accent); color: var(--accent);
      box-shadow: 0 0 24px var(--accent-bg); transform: translateY(-3px);
    }
    .category-btn.active .cat-icon { animation: popIcon 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

    @keyframes popIcon {
      0% { transform: scale(1); }
      50% { transform: scale(1.4) rotate(15deg); }
      100% { transform: scale(1.1); }
    }

    /* STATS GRID  */
    .stats-grid { 
      display: grid; 
      grid-template-columns: repeat(2, 1fr); 
      gap: 16px; 
      margin-bottom: 50px; 
    }
    .stat-card {
      background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-md);
      padding: 24px 16px; text-align: center; transition: all 0.3s ease; backdrop-filter: blur(10px);
    }
    .stat-card:hover { transform: translateY(-4px); border-color: var(--border-hover); background: var(--bg-hover); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    
    .stat-number { font-size: 32px; font-weight: 800; color: var(--text-primary); margin-bottom: 4px; display: inline-block; }
    
    @keyframes statPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.4); color: var(--accent); }
      100% { transform: scale(1); }
    }
    .pop-anim { animation: statPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
    
    .stat-label { font-size: 14px; color: var(--text-secondary); font-weight: 600; }

    .footer { text-align: center; padding: 40px 0; border-top: 1px solid var(--border); }
    .footer p { color: var(--text-muted); font-size: 14px; font-weight: 500; }

    .toast-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; pointer-events: none; }
    .toast {
      display: flex; align-items: center; gap: 12px; padding: 14px 24px; border-radius: 14px;
      background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-primary);
      font-size: 14px; font-weight: 600; box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      transform: translateY(20px) scale(0.9); opacity: 0; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .toast.show { transform: translateY(0) scale(1); opacity: 1; }
    .toast-success .toast-icon { color: #10b981; font-size: 18px; }

    @media (max-width: 640px) {
      .hero h1 { font-size: 2.2rem; }
      .generator-card { padding: 24px; }
      .theme-toggle { top: 20px; right: 20px; width: 46px; height: 46px; border-radius: 12px; }
      .stats-grid { gap: 10px; }
      .stat-card { padding: 16px; }
      .stat-number { font-size: 26px; }
    }
  </style>
</head>
<body>

  <div class="sky-container">
    <div class="ambient-glow"></div>
    <div class="stars-bg"></div>
    <div class="moon-element">
      <div class="moon-craters">
        <div class="crater" style="width: 20px; height: 20px; top: 20%; left: 30%;"></div>
        <div class="crater" style="width: 35px; height: 35px; top: 50%; left: 60%;"></div>
        <div class="crater" style="width: 15px; height: 15px; top: 70%; left: 20%;"></div>
      </div>
    </div>
    <div class="sun-element">
      <div class="sun-core"></div>
      <div class="sun-rays"></div>
    </div>
  </div>

  <button class="theme-toggle" id="themeToggle" type="button">
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>

  <div class="toast-container" id="toastContainer"></div>

  <div class="container">
    <header class="header">
      <a href="/" class="logo">
        <div class="logo-icon">&lt;/&gt;</div>
        <span class="logo-text">dev<span>excuse</span></span>
      </a>
    </header>

    <section class="hero">
      <div class="hero-badge"><span class="dot"></span>No excuses - Only better excuses</div>
      <h1>Developer<br><span class="accent-text">Excuse Generator</span></h1>
      <p>Professional excuses for bugs, delays, and production disasters. Handcrafted for senior engineers.</p>
    </section>

    <section class="generator-card" id="generatorCard">
      <div class="category-indicator">
        <span class="indicator-dot"></span>
        <span id="categoryLabel">All Excuses</span>
      </div>

      <div class="excuse-display">
        <div class="excuse-text" id="excuseText">
          <span class="fade-content empty-state">Press generate to find an excuse...</span>
        </div>
      </div>

      <div class="generator-actions">
        <button class="btn btn-primary" id="generateBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/></svg>
          Generate Excuse
        </button>
        <button class="btn btn-secondary" id="copyBtn" aria-label="Copy to clipboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>
    </section>

    <div class="section-label">Categories</div>
    
    <div class="categories">
      <button class="category-btn active" data-category="all"><span class="cat-icon">✨</span> All</button>
      <button class="category-btn" data-category="frontend"><span class="cat-icon">🎨</span> Frontend</button>
      <button class="category-btn" data-category="backend"><span class="cat-icon">⚙️</span> Backend</button>
      <button class="category-btn" data-category="devops"><span class="cat-icon">🚀</span> DevOps</button>
      <button class="category-btn" data-category="database"><span class="cat-icon">🗄️</span> Database</button>
      <button class="category-btn" data-category="ai"><span class="cat-icon">🤖</span> AI</button>
      <button class="category-btn" data-category="intern"><span class="cat-icon">🎒</span> Intern</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-number" id="statBugs">0</div>
        <div class="stat-label">Bugs Blamed</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="statDeadlines">0</div>
        <div class="stat-label">Missed Deadlines</div>
      </div>
    </div>

    <footer class="footer">
      <p>Built with ❤️ &mdash; &lt;/dev/excuse&gt;</p>
    </footer>
  </div>

  <script>
    (function() {
      'use strict';

      const excuses = {
        frontend: [
          "It works on my machine — in incognito mode, with a specific extension disabled.",
          "The CSS specificity war has claimed another victim.",
          "It's a client-side rendering issue. Try refreshing 3 times while standing on one leg.",
          "The design team wanted it pixel-perfect, so I hardcoded the layout.",
          "That's not a bug, it's an undocumented feature for power users.",

      /*  EPIC THEME TOGGLE */
      themeToggle.addEventListener('click', () => {
        const targetTheme = root.classList.contains('theme-light') ? 'dark' : 'light';
        if (!document.startViewTransition) {
          root.classList.toggle('theme-light');
          localStorage.setItem('dev-excuse-theme', targetTheme);
          return;
        }
        const rect = themeToggle.getBoundingClientRect();
        const x = rect.left + rect.width / 2;
        const y = rect.top + rect.height / 2;
        const endRadius = Math.hypot(Math.max(x, window.innerWidth - x), Math.max(y, window.innerHeight - y));

        const transition = document.startViewTransition(() => {
          root.classList.toggle('theme-light');
          localStorage.setItem('dev-excuse-theme', targetTheme);
        });

        transition.ready.then(() => {
          root.animate([
            { clipPath: `circle(0px at ${x}px ${y}px)` },
            { clipPath: `circle(${endRadius}px at ${x}px ${y}px)` }
          ], { duration: 800, easing: 'cubic-bezier(0.34, 1.56, 0.64, 1)', pseudoElement: '::view-transition-new(root)' });
        });
      });

      /*  GLITCH TEXT ANIMATION */
      function scrambleText(element, finalString, duration = 600) {
        const chars = '!<>-_\\/[]{}—=+*^?#_010101';
        let start = Date.now();
        
        let interval = setInterval(() => {
          let now = Date.now();
          let progress = (now - start) / duration;
          
          if (progress >= 1) {
            clearInterval(interval);
            element.textContent = finalString;
            return;
          }
          
          let scrambled = finalString.split('').map((char, index) => {
            if (char === ' ') return ' ';
            if (index < finalString.length * progress) return finalString[index];
            return chars[Math.floor(Math.random() * chars.length)];
          }).join('');
          
          element.textContent = scrambled;
        }, 30);
      }

      document.querySelectorAll('.category-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const cat = btn.dataset.category;
          state.currentCategory = cat;
          document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          
          // Re-trigger icon pop animation
          const icon = btn.querySelector('.cat-icon');
          icon.style.animation = 'none';
          void icon.offsetWidth;
          icon.style.animation = '';

          document.getElementById('categoryLabel').textContent = categoryNames[cat];
          root.style.setProperty('--accent', categoryColors[cat]);
          root.style.setProperty('--accent-bg', categoryColors[cat] + '26');
          root.style.setProperty('--accent-border', categoryColors[cat] + '40');
        });
      });

      copyBtn.addEventListener('click', async () => {
        if (!state.currentExcuse) return showToast('Generate an excuse first!', 'error');
        await navigator.clipboard.writeText(state.currentExcuse);
        showToast('Excuse copied to clipboard', 'success');
      });

      generateBtn.addEventListener('click', generateExcuse);
      
      function showToast(msg, type) {
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.innerHTML = `<span class="toast-icon">&#10004;</span> ${msg}`;
        toastContainer.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => {
          toast.classList.remove('show');
          setTimeout(() => toast.remove(), 400);
        }, 2500);
      }

      function updateStats() {
        [statBugs, statDeadlines].forEach(el => {
          el.classList.remove('pop-anim');
          void el.offsetWidth;
          el.classList.add('pop-anim');
        });
        statBugs.textContent = state.bugs;
        statDeadlines.textContent = state.deadlines;
      }

      /* 3D TILT EFFECT  */
      let tiltRaf;
      const tilt = { x: 0, y: 0, tx: 0, ty: 0 };
      generatorCard.addEventListener('mousemove', (e) => {
        const rect = generatorCard.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width;
        const y = (e.clientY - rect.top) / rect.height;
        generatorCard.style.setProperty('--cursor-x', `${x * 100}%`);
        generatorCard.style.setProperty('--cursor-y', `${y * 100}%`);
        tilt.tx = (x - 0.5) * 6; tilt.ty = (y - 0.5) * -6;
        if (!tiltRaf) tickTilt();
      });
      generatorCard.addEventListener('mouseleave', () => { tilt.tx = 0; tilt.ty = 0; });
      
      function tickTilt() {
        tilt.x += (tilt.tx - tilt.x) * 0.1; tilt.y += (tilt.ty - tilt.y) * 0.1;
        generatorCard.style.setProperty('--rotate-x', `${tilt.y}deg`);
        generatorCard.style.setProperty('--rotate-y', `${tilt.x}deg`);
        if (Math.abs(tilt.x - tilt.tx) > 0.01) { tiltRaf = requestAnimationFrame(tickTilt); } 
        else { tiltRaf = null; }
      }
    })();
  </script>

</body>
</html>
